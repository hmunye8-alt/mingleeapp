# 1. Query for a user's chats
query GetMyChats @auth(level: USER) {
  chatParticipants(where: { userId: { eq: "auth.uid" } }) {
    chat {
      id
      name
      isGroupChat
      photoUrl
      updatedAt
    }
  }
}

# 2. Mutation to send a new chat message
mutation SendChatMessage($chatId: String!, $text: String!, $type: String, $imageUrl: String) @auth(level: USER) {
  chatMessage_insert(
    data: {
      chatId: $chatId,
      text: $text,
      senderId_expr: "auth.uid",
      createdAt_expr: "request.time",
      type: $type,
      imageUrl: $imageUrl
    }
  ) {
    id
  }
}

# 3. Query to get messages for a specific chat
query GetChatMessages($chatId: String!) @auth(level: USER) {
  chatMessages(where: { chatId: { eq: $chatId } }, orderBy: [{ createdAt: ASC }]) {
    id
    text
    createdAt
    type
    imageUrl
    sender {
      id
      displayName
      photoUrl
    }
  }
}

# 4. Mutation to update a user's display name
mutation UpdateMyDisplayName($newDisplayName: String!) @auth(level: USER) {
  user_update(
    key: { id_expr: "auth.uid" },
    data: { displayName: $newDisplayName, lastActiveAt_expr: "request.time" }
  ) {
    id
  }
}